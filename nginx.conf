# nginx.conf — sample for local.httpclient.de
# Drop this in /etc/nginx/sites-available/httpclient and symlink to sites-enabled

server {
    listen 443 ssl http2;
    server_name local.httpclient.de;

    # TLS — adjust paths for your cert provider (Let's Encrypt shown)
    ssl_certificate     /etc/letsencrypt/live/httpclient.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/httpclient.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/httpclient-pwa;
    index index.html;

    # --- Caching strategy -------------------------------------------------

    # Service Worker & manifest: NEVER cache (browser must always revalidate)
    location ~* (sw\.js|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # Versioned static assets: cache for 1 year (immutable)
    location ~* \.(js|css|png|webp|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML: short cache
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # --- Security headers --------------------------------------------------
    add_header X-Content-Type-Options   "nosniff"                    always;
    add_header X-Frame-Options          "DENY"                       always;
    add_header X-XSS-Protection         "1; mode=block"              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;

    # CSP: app fetches arbitrary URLs (connect-src *), everything else is self
    add_header Content-Security-Policy
        "default-src 'self'; connect-src *; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self'"
        always;

    # --- SPA fallback -----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name local.httpclient.de;
    return 301 https://$host$request_uri;
}
