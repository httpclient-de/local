<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — httpclient</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #e6a817;
      --font-ui: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-ui); height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 32px; text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; font-size: 28px;
    }
    h1 { font-size: 22px; font-weight: 600; }
    p  { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 320px; }
    code {
      font-family: var(--font-mono); font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 6px; color: var(--accent);
    }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); border-radius: 6px;
      color: var(--bg); font-weight: 600; font-size: 14px;
      padding: 10px 20px; text-decoration: none; margin-top: 8px;
      transition: filter 0.15s;
    }
    a:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="icon">⇄</div>
  <h1>You're offline</h1>
  <p>
    <strong>httpclient</strong> is a PWA — the app itself works offline, but outbound requests require a network connection.<br><br>
    If you installed the app, open it directly from your homescreen/desktop. Your request history is available via <code>IndexedDB</code>.
  </p>
  <a href="/">Try again</a>
</body>
</html>
